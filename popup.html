<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Latest News</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <div class="logo">Y</div>
      <h1>Hacker News</h1>
    </div>
    <button id="refresh-btn" title="Refresh now">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10" />
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
    </button>
  </header>

  <!-- Search bar -->
  <div id="search-bar">
    <div class="search-input-wrapper">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" id="search-input" placeholder="Search topics, people, domains…" autocomplete="off"
        spellcheck="false">
      <button id="clear-search-btn" class="clear-btn hidden" title="Clear search">✕</button>
    </div>
  </div>

  <!-- News cards container -->
  <main id="news-container">
    <!-- Cards are injected here by popup.js -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading stories…</p>
    </div>
  </main>

  <!-- SMS Notification section -->
  <div id="sms-section">
    <div class="sms-header">📲 Send news via WhatsApp</div>
    <div class="sms-input-wrapper">
      <input type="tel" id="phone-input" placeholder="+91XXXXXXXXXX (WhatsApp number)" autocomplete="off"
        spellcheck="false">
      <button id="send-sms-btn" title="Send SMS">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
        Send
      </button>
    </div>

    <!-- WhatsApp Sandbox Setup -->
    <div class="whatsapp-setup">
      <p class="setup-text"><strong>First time?</strong> Scan to join the sandbox before sending:</p>
      <div class="setup-content">
        <img src="images/whatsapp-qr.png" alt="WhatsApp Sandbox QR" class="qr-img">
        <span class="setup-instruction">Send <b>join &lt;keyword&gt;</b> to +1 415 523 8886</span>
      </div>
    </div>

    <div id="sms-status" class="sms-status hidden"></div>
  </div>

  <!-- Footer -->
  <footer id="footer">
    <span id="last-updated">Updated: —</span>
    <a href="https://news.ycombinator.com" target="_blank" rel="noopener">Visit HN ↗</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>

</html>
